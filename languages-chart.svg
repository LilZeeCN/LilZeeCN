<svg width="280" height="300" xmlns="http://www.w3.org/2000/svg">
  <style>
    .chart { transform: translate(140px, 150px); }
    .segment { fill: none; stroke-width: 80; }
    .python { stroke: #00D8FF; stroke-dasharray: 126 503; }
    .cpp { stroke: #0051D8; stroke-dasharray: 90 503; stroke-dashoffset: -126; }
    .ts { stroke: #007ACC; stroke-dasharray: 72 503; stroke-dashoffset: -216; }
    .js { stroke: #FFD700; stroke-dasharray: 43 503; stroke-dashoffset: -288; }
    .sql { stroke: #00CED1; stroke-dasharray: 29 503; stroke-dashoffset: -331; }
    .center { fill: #0d1117; stroke: #00FF41; stroke-width: 2; }
    .ring { fill: none; stroke: #00FF41; stroke-width: 0.5; stroke-dasharray: 4 4; opacity: 0.4; }
  </style>

  <rect width="280" height="300" fill="#0d1117" rx="8"/>

  <text x="140" y="30" text-anchor="middle" font-family="monospace" font-size="16" font-weight="bold" fill="#00FF41">LANGUAGES</text>
  <text x="140" y="48" text-anchor="middle" font-family="monospace" font-size="10" fill="#00FF41" opacity="0.5">SYSTEM.COMPILER.LANG</text>

  <g class="chart">
    <circle class="segment python" r="40" cx="0" cy="0"/>
    <circle class="segment cpp" r="40" cx="0" cy="0"/>
    <circle class="segment ts" r="40" cx="0" cy="0"/>
    <circle class="segment js" r="40" cx="0" cy="0"/>
    <circle class="segment sql" r="40" cx="0" cy="0"/>
    <circle class="center" r="17.5" cx="0" cy="0"/>
    <text x="0" y="5" text-anchor="middle" font-family="monospace" font-size="12" font-weight="bold" fill="#00FF41">DEV</text>
  </g>

  <g font-family="monospace" font-size="9">
    <rect x="25" y="245" width="10" height="10" fill="#00D8FF" stroke="#00FF41" stroke-width="0.5"/>
    <text x="40" y="254" fill="#00FF41">Python 35%</text>
    <rect x="115" y="245" width="10" height="10" fill="#0051D8" stroke="#00FF41" stroke-width="0.5"/>
    <text x="130" y="254" fill="#00FF41">C++ 25%</text>
    <rect x="25" y="262" width="10" height="10" fill="#007ACC" stroke="#00FF41" stroke-width="0.5"/>
    <text x="40" y="271" fill="#00FF41">TS 20%</text>
    <rect x="115" y="262" width="10" height="10" fill="#FFD700" stroke="#FFD700" stroke-width="0.5"/>
    <text x="130" y="271" fill="#FFD700">JS 12%</text>
    <rect x="25" y="279" width="10" height="10" fill="#00CED1" stroke="#00CED1" stroke-width="0.5"/>
    <text x="40" y="288" fill="#00CED1">SQL 8%</text>
  </g>
</svg>
