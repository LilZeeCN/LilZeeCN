<svg width="390" height="320" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&amp;display=swap');
      .title { font-family: 'Inter', sans-serif; font-size: 21px; font-weight: 600; fill: #fff; }
      .label { font-family: 'Inter', sans-serif; font-size: 15px; font-weight: 400; fill: #d0d0d0; }
      .percent { font-family: 'Inter', sans-serif; font-size: 15px; font-weight: 500; fill: #E94560; }
      .card-bg { fill: #000000; }
      .icon { fill: #E94560; }
    </style>
  </defs>

  <!-- 卡片背景 -->
  <rect width="390" height="320" rx="14" class="card-bg"/>

  <!-- 标题 -->
  <text x="28" y="45" class="title">Dev Tools</text>

  <!-- 工具列表 -->
  <!-- Git 40% -->
  <g transform="translate(28, 90)">
    <circle r="9" fill="#FF6B35"/>
    <text x="24" y="5" class="label">Git</text>
    <text x="334" y="5" class="percent" text-anchor="end">40%</text>
  </g>

  <!-- Linux 35% -->
  <g transform="translate(28, 125)">
    <circle r="9" fill="#FFCC00"/>
    <text x="24" y="5" class="label">Linux</text>
    <text x="334" y="5" class="percent" text-anchor="end">35%</text>
  </g>

  <!-- Vim 25% -->
  <g transform="translate(28, 160)">
    <circle r="9" fill="#00FF41"/>
    <text x="24" y="5" class="label">Vim</text>
    <text x="334" y="5" class="percent" text-anchor="end">25%</text>
  </g>

  <!-- 装饰环形图 -->
  <g transform="translate(195, 230)">
    <!-- 外圈 -->
    <circle r="40" fill="none" stroke="#2a2a2a" stroke-width="5"/>
    <circle r="40" fill="none" stroke="#E94560" stroke-width="5" stroke-dasharray="251" stroke-dashoffset="0" transform="rotate(-90)"/>
    <!-- 内圈装饰 -->
    <circle r="30" fill="none" stroke="#2a2a2a" stroke-width="2"/>
    <text x="0" y="5" text-anchor="middle" font-family="monospace" font-size="14" font-weight="bold" fill="#E94560">KIT</text>
  </g>

  <!-- 装饰元素 -->
  <rect x="28" y="280" width="334" height="22" rx="6" fill="#0a0a0a"/>
  <text x="195" y="296" text-anchor="middle" font-family="monospace" font-size="11" fill="#E94560">SYSTEM.TOOLKIT.V1</text>
</svg>
