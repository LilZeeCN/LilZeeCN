<svg width="280" height="300" xmlns="http://www.w3.org/2000/svg">
  <style>
    .chart { transform: translate(140px, 150px); }
    .segment { fill: none; stroke-width: 80; }
    .git { stroke: #FF6B35; stroke-dasharray: 144 503; }
    .linux { stroke: #FFCC00; stroke-dasharray: 126 503; stroke-dashoffset: -144; }
    .vim { stroke: #00FF41; stroke-dasharray: 90 503; stroke-dashoffset: -270; }
    .center { fill: #0d1117; stroke: #E94560; stroke-width: 2; }
  </style>

  <rect width="280" height="300" fill="#0d1117" rx="8"/>

  <text x="140" y="30" text-anchor="middle" font-family="monospace" font-size="16" font-weight="bold" fill="#E94560">TOOLS</text>
  <text x="140" y="48" text-anchor="middle" font-family="monospace" font-size="10" fill="#E94560" opacity="0.5">SYSTEM.TOOLKIT.V1</text>

  <g class="chart">
    <circle class="segment git" r="40" cx="0" cy="0"/>
    <circle class="segment linux" r="40" cx="0" cy="0"/>
    <circle class="segment vim" r="40" cx="0" cy="0"/>
    <circle class="center" r="17.5" cx="0" cy="0"/>
    <text x="0" y="5" text-anchor="middle" font-family="monospace" font-size="12" font-weight="bold" fill="#E94560">KIT</text>
  </g>

  <g font-family="monospace" font-size="9">
    <rect x="60" y="245" width="10" height="10" fill="#FF6B35" stroke="#E94560" stroke-width="0.5"/>
    <text x="75" y="254" fill="#FF6B35">Git 40%</text>
    <rect x="60" y="262" width="10" height="10" fill="#FFCC00" stroke="#E94560" stroke-width="0.5"/>
    <text x="75" y="271" fill="#FFCC00">Linux 35%</text>
    <rect x="60" y="279" width="10" height="10" fill="#00FF41" stroke="#00FF41" stroke-width="0.5"/>
    <text x="75" y="288" fill="#00FF41">Vim 25%</text>
  </g>
</svg>
